name: Spark tests

# The JVM-backed transformation + data-quality tests (tests/spark/). Kept in a
# separate workflow from the fast CI gate so it needs a JDK + PySpark and doesn't
# slow down every push's lint/typecheck/unit-test loop.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: spark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spark:
    name: transformations + data quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment (dev + spark groups)
        run: uv sync --group spark

      - name: Run Spark tests
        run: uv run --group spark pytest tests/spark
