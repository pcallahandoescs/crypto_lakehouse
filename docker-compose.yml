# Local stack for the lakehouse: Kafka, MinIO, Spark, and Airflow on one network.
#
# Kafka is a single-broker Apache Kafka in KRaft mode.
#
# KRaft = Kafka's built-in Raft-based metadata layer. It replaces ZooKeeper, so
# this one container is the entire Kafka control + data plane (no separate ZK).
# In Kafka 4.x ZooKeeper is removed entirely; KRaft is the only mode.

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      # Only the HOST listener is published to your machine. Clients on the host
      # (console tools, the producer) connect via localhost:9092.
      - "9092:9092"
    environment:
      # --- KRaft: this single node is BOTH broker and controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # --- Listeners ---
      # Three listeners:
      #   HOST       -> for clients on your laptop (advertised as localhost:9092)
      #   DOCKER     -> for other containers on the compose network (kafka:29092)
      #   CONTROLLER -> internal KRaft consensus traffic
      # The dual HOST/DOCKER split is the classic "advertised listeners" fix so
      # both host tools AND in-network services (Spark, Week 2) can reach Kafka.
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,DOCKER://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: HOST:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

      # --- Single-node settings (no replication possible with one broker) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Force explicit topic creation (no accidental auto-created topics).
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 6

      # Persist the log to the mounted volume (survives restarts).
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  # Our custom producer image (built from producer/Dockerfile). Streams live
  # Coinbase trades into Kafka. `build:` (not `image:`) makes this our own image.
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: producer
    depends_on:
      # Wait until Kafka's healthcheck passes before starting — otherwise the
      # producer would race the broker and fail its first connection.
      kafka:
        condition: service_healthy
    environment:
      # Talk to Kafka over the in-network DOCKER listener, not localhost.
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: crypto.trades.raw
      PRODUCTS: "BTC-USD,ETH-USD"
    # Recover from transient WebSocket/broker hiccups automatically.
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # MinIO: S3-compatible object storage — the lakehouse storage layer.
  # Delta tables (bronze/silver/gold) will live here, reached by Spark via the
  # S3A connector exactly as they would against real S3 — so the design is
  # cloud-portable (swap MinIO for S3/GCS/ADLS with a config change).
  #
  # Image: MinIO stopped publishing to Docker Hub/Quay (Oct 2025); the leftover
  # images are unmaintained (CVE-2025-62506). We use Chainguard's maintained,
  # secure-by-default image instead. See docs/adr/0011-minio-image-chainguard.md.
  # ----------------------------------------------------------------------------
  minio:
    image: cgr.dev/chainguard/minio:latest
    container_name: minio
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000" # S3 API (Spark, mc, SDKs connect here)
      - "9001:9001" # web console — browse at http://localhost:9001
    environment:
      # Local-dev credentials only. In production these are secrets, not literals.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    # No container healthcheck on purpose: Chainguard's minimal image has no shell
    # or curl to probe the /minio/health/live endpoint from inside. Readiness is
    # handled by clients instead — createbuckets retries via restart:on-failure,
    # and Spark's S3A client retries its connections. (A team wanting a real
    # healthcheck could use the "-dev" image variant, which bundles a shell.)
    restart: unless-stopped

  # One-shot init container: create the medallion buckets, then exit.
  # The Chainguard mc image is minimal (no shell), so instead of a `sh` wait-loop
  # we point mc at MinIO via MC_HOST_* and let Docker's restart:on-failure retry
  # until MinIO accepts connections. `--ignore-existing` makes it idempotent, so
  # it's safe to re-run on every `up` (or `docker compose run --rm createbuckets`).
  createbuckets:
    image: cgr.dev/chainguard/minio-client:latest
    container_name: createbuckets
    depends_on:
      - minio
    environment:
      MC_HOST_local: "http://minioadmin:minioadmin@minio:9000"
    command: ["mb", "--ignore-existing", "local/bronze", "local/silver", "local/gold"]
    restart: on-failure

  # ----------------------------------------------------------------------------
  # Spark job-runner: Spark 3.5.3 + Delta + S3A, for reading/writing the
  # Delta lakehouse on MinIO. This is a *job runner*, not a long-lived service —
  # it runs a job and exits, so it's behind the "jobs" profile (a plain
  # `docker compose up` won't start it). Run a job with:
  #   docker compose run --rm spark                          # the smoke test
  #   docker compose run --rm spark /opt/spark/bin/spark-submit --master local[*] <job.py>
  # Local mode (local[*]) is enough here; a standalone master/worker is the
  # scale-up. spark_jobs/ is mounted so jobs can be edited without rebuilding.
  # ----------------------------------------------------------------------------
  spark:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    image: crypto-lakehouse-spark:3.5.3
    profiles: ["jobs"]
    depends_on:
      - minio
      - kafka
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Bronze stream reads Kafka over the in-network DOCKER listener.
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: crypto.trades.raw
    volumes:
      - ./spark_jobs:/opt/spark/work-dir
    working_dir: /opt/spark/work-dir
    command: ["/opt/spark/bin/spark-submit", "--master", "local[*]", "test_delta.py"]

  # ----------------------------------------------------------------------------
  # Airflow: orchestration for batch jobs + backfills.
  # Scheduler submits Spark via Docker Compose (socket + project mount).
  # UI: http://localhost:8088 (admin / admin)
  # Build Spark image first: docker compose --profile jobs build spark
  # ----------------------------------------------------------------------------
  x-airflow-common: &airflow-common
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: crypto-lakehouse-airflow:2.10.4
    profiles: ["orchestration"]
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlFOTFCJ63CrKo653k3TAD3pQELN12R4Xy1DBHsTJ9qK7ue="
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      LAKEHOUSE_PROJECT_DIR: /opt/project
      LAKEHOUSE_HOST_DIR: ${PWD}
      LAKEHOUSE_DOCKER_NETWORK: crypto_pipeline_project_default
      SPARK_IMAGE: crypto-lakehouse-spark:3.5.3
      SPARK_DRIVER_MEMORY: 2g
    volumes: &airflow-common-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    user: "50000:0"

  postgres:
    image: postgres:16-alpine
    container_name: airflow-postgres
    profiles: ["orchestration"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: webserver
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    # Dev-only: root so LocalExecutor can reach the mounted Docker socket.
    user: "0:0"
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Serving API: a JVM-free FastAPI over the gold layer. Reads gold Delta tables
  # straight from MinIO via delta-rs (no Spark), so it's a lightweight,
  # long-lived service — starts with a plain `docker compose up`.
  #   Docs:     http://localhost:8000/docs
  #   Candles:  http://localhost:8000/candles?product=BTC-USD
  # ----------------------------------------------------------------------------
  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    image: crypto-lakehouse-serving:0.1.0
    container_name: serving
    depends_on:
      - minio
    environment:
      # delta-rs reaches MinIO the same S3-compatible way Spark does.
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      GOLD_BASE_URI: s3://gold
      PRODUCTS: "BTC-USD,ETH-USD"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  kafka-data:
  minio-data:
  airflow-postgres-data:
